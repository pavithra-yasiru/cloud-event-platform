apiVersion: apps/v1
kind: Deployment

metadata:
  name: registration-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: registration-service

  template:
    metadata:
      labels:
        app: registration-service

    spec:
      containers:
      - name: registration-service
        image: registration-service:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 8000
