<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Cloud Event Platform Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#f5f7fb;
}

.dashboard-title{
    text-align:center;
    margin:30px;
    font-weight:bold;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0px 3px 10px rgba(0,0,0,.15);
}

.card h2{
    font-size:34px;
    margin-top:15px;
}

table{
    background:white;
}

</style>

</head>

<body>

<div class="container">

<h1 class="dashboard-title">
Cloud Event Platform Analytics Dashboard
</h1>

<div class="row">

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>🏠 Homepage Visits</h5>
<h2 id="homeVisits">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>📚 Program Views</h5>
<h2 id="programViews">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>📝 Registrations</h5>
<h2 id="registrations">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>📊 Total Events</h5>
<h2 id="totalEvents">0</h2>
</div>
</div>

</div>

<br>

<div class="card p-4">

<h4>Analytics Activity</h4>

<canvas id="analyticsChart"></canvas>

</div>

<br>

<div class="card p-4">

<h4>Recent Analytics Events</h4>

<table class="table table-striped">

<thead>

<tr>

<th>Time</th>

<th>Event</th>

<th>Page</th>

</tr>

</thead>

<tbody id="analyticsTable">

</tbody>

</table>

</div>

</div>

<script src="dashboard.js"></script>

</body>

</html>
